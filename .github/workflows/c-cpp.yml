name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-22.04
    env:
      SDL_DIRECTORY: "$HOME/local-sdl"

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install apt dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: build-essential git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev cmake libharfbuzz-dev

    - name: Cache SDL libraries
      id: cache-sdl
      uses: actions/cache@v4
      with:
        path: $SDL_DIRECTORY
        key: ${{ runner.os }}-cache-sdl

    - if: ${{ steps.cache-sdl.outputs.cache-hit != 'true' }}
      name: Install SDL libraries
      run: |
        git clone https://github.com/libsdl-org/SDL.git
        cd SDL
        cmake -S . -B build -DCMAKE_INSTALL_PREFIX="$SDL_DIRECTORY"
        cmake --build build -j
        sudo cmake --install build --prefix "$SDL_DIRECTORY"

        git clone https://github.com/libsdl-org/SDL_ttf/
        cd SDL_ttf
        ./external/download.sh
        ls "$SDL_DIRECTORY/lib/cmake/SDL3"
        cmake -S . -B build -DCMAKE_INSTALL_PREFIX="$SDL_DIRECTORY" \
        -DSDL3_DIR="$SDL_DIRECTORY/lib/cmake/SDL3"
        echo "First"
        cmake --build build -j
        echo "Second"
        sudo cmake --install build --prefix "$SDL_DIRECTORY"
        echo "Third"

    - name: Compile tests
      run: make -j tests
    
    - name: Execute tests
      run: bin/tests
